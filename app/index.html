<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00FFA3" />
  <meta name="description" content="GableLBM - The Modern Operating System for Lumber & Building Materials" />

  <!-- Google Fonts: Outfit (UI) & Roboto Mono (Data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">

  <title>GableLBM | Enterprise OS</title>
</head>

<body>
  <style>
    body {
      background-color: #0A0B10;
      margin: 0;
      font-family: sans-serif;
    }

    .initial-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
    }

    .spinner {
      width: 64px;
      height: 64px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top-color: #00FFA3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      mb: 20px;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .brand {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 0.2em;
      margin-top: 24px;
    }

    .accent {
      color: #00FFA3;
    }
  </style>
  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <div class="brand">GABLE<span class="accent">LBM</span></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
